<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanCraft Command Center — Login</title>
<meta name="robots" content="noindex, nofollow">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0F172A; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-container { background: #1E293B; border: 1px solid #334155; border-radius: 16px; padding: 48px; width: 400px; max-width: 90vw; text-align: center; }
.logo { font-size: 32px; font-weight: 800; color: #D4AF37; margin-bottom: 8px; }
.subtitle { color: #94A3B8; font-size: 14px; margin-bottom: 32px; }
.input-group { margin-bottom: 20px; text-align: left; }
.input-group label { color: #CBD5E1; font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
.input-group input { width: 100%; padding: 12px 16px; background: #0F172A; border: 1px solid #475569; border-radius: 8px; color: #F8FAFC; font-size: 15px; outline: none; transition: border 0.2s; }
.input-group input:focus { border-color: #D4AF37; }
.btn-login { width: 100%; padding: 14px; background: #D4AF37; color: #0F172A; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-login:hover { background: #E5C158; transform: translateY(-1px); }
.error { color: #EF4444; font-size: 13px; margin-top: 12px; display: none; }
.footer { color: #475569; font-size: 11px; margin-top: 24px; }
.loading { display: none; color: #D4AF37; margin-top: 16px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #334155; border-top-color: #D4AF37; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="login-container" id="loginBox">
  <div class="logo">PlanCraft</div>
  <div class="subtitle">Command Center — Restricted Access</div>
  <div class="input-group">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="Enter password" autofocus onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn-login" onclick="doLogin()">Login</button>
  <div class="error" id="err">Incorrect password. Try again.</div>
  <div class="loading" id="loading"><span class="spinner"></span>Decrypting content...</div>
  <div class="footer">Access restricted to authorized team members only</div>
</div>

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function doLogin() {
  const pwd = document.getElementById("pwd").value;
  const hash = await sha256(pwd);
  if (hash !== HASH) {
    document.getElementById("err").style.display = "block";
    document.getElementById("pwd").select();
    return;
  }
  document.getElementById("err").style.display = "none";
  document.getElementById("loading").style.display = "block";
  
  setTimeout(() => {
    try {
      // Decode base64
      const binary = atob(DATA);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      
      // Decompress (pako)
      const decompressed = pako.inflate(bytes, { to: "string" });
      
      // Replace entire document
      document.open();
      document.write(decompressed);
      document.close();
    } catch(e) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("err").textContent = "Decryption error: " + e.message;
      document.getElementById("err").style.display = "block";
    }
  }, 100);
}
